<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLASHVIS — flash filesystems on NOR, live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Structural constants shared by every theme: hairlines and body text stay a
     neutral cool grey so text/line contrast is guaranteed in ALL palettes (good
     dark-theme practice — the ambient below carries the color, the type stays
     maximally legible). --err/--lead/--queued are semantic (fault / leader /
     queued) and read the same everywhere. Everything a theme owns is a var it
     re-declares below. */
  --line:#20313c; --line-soft:#182530;
  --txt:#cdd9e0; --txt-dim:#647884; --txt-faint:#6d818d;
  --err:#e5686d; --queued:#7d8fa6; --lead:#8fe6a0;
  /* desaturated 8-pin chip package (enclosure only, never the cell-state colors) */
  --pkg-a:#17191c; --pkg-b:#0e1012; --pkg-line:#2b2f34; --pin:#7b8085; --pin-b:#43474b;
  --sector-gap:6px; --cell-gap:2px; --radius:3px;

  /* ============================ THEME PALETTES ============================
     Each palette re-skins the WHOLE page (ambient bg + panels + raised control
     chrome + accent), not just the die, so the die never reads out of context.
     Two information layers carry the data:
       STATE FILLS (matte): erased / live (--prog) / obsolete (--stale) / metadata.
       OP GLOWS (lit, bloom, desaturate-to-white with heat): read / program / erase.
     Fixed op grammar in every theme for muscle memory + colorblind separation:
     READ = cool scan, PROGRAM = warm write, ERASE = third-axis event.
     The load-bearing requirement is the OP-OVER-STATE overlay: a glow renders on
     top of a cell that already holds a state color, and BOTH must stay readable.
     The base op hue (low/mid heat, before it whitens) is therefore kept distinct
     from EVERY state it can sit on — by hue where possible, by lightness +
     saturation where the families are close (read-over-live, program-over-live).
     See the per-theme overlay notes. viz.js re-sources --read/--program/--erase/
     --prog-edge/--sector-bg for the live glow. Aurora is the :root default so the
     page renders fully themed before JS runs.

     DISTINCTIVENESS: the four state fills are meant to be unmistakably their OWN
     color at a glance, so coherence is carried by the ambient/substrate + one
     consistent LOGIC, not by muting the functional colors. That logic: erased is
     the darkest substrate tint; live + metadata are the two SATURATED heroes on
     far-apart hues; obsolete is a mid-lightness NEUTRAL ASH (spent data reads as
     colorless AMONG the saturated colors, and a neutral also makes every op-glow
     overlay trivially legible). Op hues are pushed saturated too. */

  /* 1 · AURORA SIGNAL — instrument-on-dark-glass (default). */
  --bg:#0b0f14; --panel:#101821; --panel-2:#0c131a; --chrome:#16212b;
  --glow-a:#12202b; --glow-b:#131a26;
  --erased:#132029; --erased-edge:#2b4a57;
  --prog:#f2b23a; --prog-edge:#ffd472;
  --stale:#5c646d; --stale-edge:#7c848d; --index:#3fa0e0;
  --read:#4de3ff; --program:#ff6a1a; --erase:#b06bff;
  --accent:#45d6c0; --accent-dim:#2f5d57; --hold:#f2b23a;
  --sector-bg:#0c1013;
  /* cells at a glance: dark slate / saturated gold / ash blue-grey / vivid sky-blue.
     overlay: read cyan(h191,L88) over metadata sky-blue(h204,L64) → lightness+hue;
     program red-orange(h18) over gold live(h44) → hue26+sat; every op over the
     neutral ash obsolete → trivially high-contrast. */
}
/* 2 · MAGMA — a volcanic core, deliberately the warm counterweight to Aurora's
   cool glass: warm obsidian substrate + ember accent, cooled basalt erased,
   sulfur-gold molten live, a cobalt mineral vein for metadata, a red-hot write,
   and a magenta plasma discharge to erase. Cyan read is the one cold probe. */
:root[data-theme="magma"]{
  --bg:#100b0a; --panel:#1c1512; --panel-2:#130d0b; --chrome:#241a15;
  --glow-a:#341811; --glow-b:#26120e;
  --erased:#1c1a1e; --erased-edge:#3a342e;
  --prog:#ffc21f; --prog-edge:#ffe07a;
  --stale:#625049; --stale-edge:#83695f; --index:#3a6bff;
  --read:#2fd6ff; --program:#ff3b1e; --erase:#ff3d7a;
  --accent:#ff7a4d; --accent-dim:#7a3316; --hold:#ffc21f;
  --sector-bg:#14100e;
  /* cells at a glance: basalt grey / sulfur gold / warm ash-brown / cobalt blue.
     overlay: read cyan(h192) over metadata cobalt(h222) → hue30+brightness;
     program red(h8) over sulfur live(h45) → hue37+redder; magenta erase(h340)
     over gold/cobalt/ash → far; every op over ash obsolete → high-contrast. */
}
/* 3 · ULTRAVIOLET LAB — an indigo cleanroom under UV. Ice-blue read, hot-
   magenta write, a UV-reactive lime erase (blue/magenta/green is the most
   colorblind-robust op trio). Live glows blue-violet; metadata is teal. */
:root[data-theme="uv"]{
  --bg:#0b0d16; --panel:#14162a; --panel-2:#0e1020; --chrome:#1c1e34;
  --glow-a:#1c1a3a; --glow-b:#181534;
  --erased:#111427; --erased-edge:#2b3160;
  --prog:#b25cf0; --prog-edge:#d69cff;
  --stale:#55506a; --stale-edge:#726c88; --index:#2fd6cf;
  --read:#5aa6ff; --program:#ff3d9e; --erase:#a6ff45;
  --accent:#5aa6ff; --accent-dim:#2f4d78; --hold:#b25cf0;
  --sector-bg:#0b0d18;
  /* cells at a glance: dark indigo / vivid orchid / violet-grey ash / vivid teal.
     overlay: read blue(h215) over metadata teal(h175) → hue40; program magenta
     (h328) over orchid live(h278) → hue50 + big sat/brightness gap; lime erase
     over teal/orchid/ash → far; blue/magenta/lime is the colorblind-robust trio. */
}
/* 4 · TERMINAL PHOSPHOR — the storage-tool vernacular on a green-black tube, but
   a MULTI-phosphor set so the states stay distinct: vivid green live, cyan
   metadata, a dim grey-green burn for obsolete, with amber write + red erase.
   Op TYPE also reads through MOTION (read bloom / program fill-rise / erase
   sweep) for the green-vs-red colorblind pair. */
:root[data-theme="phosphor"]{
  --bg:#0a0f0a; --panel:#10160f; --panel-2:#0c110b; --chrome:#182016;
  --glow-a:#12220f; --glow-b:#101a0d;
  --erased:#0e150e; --erased-edge:#244020;
  --prog:#6ce02f; --prog-edge:#a6ff6b;
  --stale:#4a5540; --stale-edge:#626e54; --index:#2fd6d0;
  --read:#4dff88; --program:#ffb52e; --erase:#ff4130;
  --accent:#4dff88; --accent-dim:#2a6b45; --hold:#ffb52e;
  --sector-bg:#0a0f0a;
  /* multi-phosphor, not one green: vivid green live / cyan metadata / dim grey-green
     ash obsolete, plus amber write + red erase. overlay: read(h145,L86) over live
     yellow-green(h100,L72) → hue45+lightness; read over cyan metadata(h178) → hue33;
     amber/red ops over any green state → warm/cool; green-vs-red also carries on the
     phosphor MOTION cue (read bloom / program fill-rise / erase sweep). */
}
/* 5 · DEEP SEA — an abyssal dive: bioluminescent sea-green scan, an
   anglerfish amber lure for writes, a jellyfish rose-magenta erase. Live is a
   vivid coral against the cold trench; metadata a bright water-blue. */
:root[data-theme="deepsea"]{
  --bg:#0a1218; --panel:#101d24; --panel-2:#0b151b; --chrome:#16262e;
  --glow-a:#0e2a30; --glow-b:#102028;
  --erased:#0d1a20; --erased-edge:#21455a;
  --prog:#ff7a52; --prog-edge:#ffa583;
  --stale:#47565a; --stale-edge:#63757a; --index:#2f9fe0;
  --read:#2ff0c8; --program:#ff9a2e; --erase:#ff4db0;
  --accent:#2ff0c8; --accent-dim:#245f56; --hold:#ff7a52;
  --sector-bg:#0a141a;
  /* cells at a glance: deep trench-blue / vivid coral / slate-teal ash / water-blue.
     overlay: read sea-green(h168) over metadata water-blue(h202) → hue34+brightness;
     program amber(h33) over coral live(h13) → hue20+yellower; rose-magenta erase
     (h330) over coral/water-blue/ash → far. */
}
/* 6 · CYANOTYPE BLUEPRINT — a drafting print: paper-white-blue read over a
   blueprint-cyan field, orange annotation for writes, a crimson correction to
   erase. Metadata is a warm amber margin note (cool read never collides). */
:root[data-theme="blueprint"]{
  --bg:#091320; --panel:#0f1d2c; --panel-2:#0a1420; --chrome:#16293a;
  --glow-a:#123049; --glow-b:#0f2036;
  --erased:#0e1a2a; --erased-edge:#24466b;
  --prog:#2f9fe0; --prog-edge:#6cc4f0;
  --stale:#46565f; --stale-edge:#61737d; --index:#f5b135;
  --read:#d6ecff; --program:#ff7a33; --erase:#ff3b52;
  --accent:#2f9fe0; --accent-dim:#2c5f7e; --hold:#ff7a33;
  --sector-bg:#09131f;
  /* cells at a glance: dark ink-blue / vivid blueprint-cyan / slate ash / vivid amber.
     overlay: read paper-white(L93,sat~15%) over saturated cyan live(h202,L60,sat65%)
     → chalk-over-line, a deliberate lightness+saturation split (the one cool-on-cool
     pair); program orange & crimson erase over cyan/amber/ash states → warm/cool,
     all high-contrast. */
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1200px 700px at 78% -8%, var(--glow-a) 0%, transparent 60%),
    radial-gradient(900px 600px at -6% 108%, var(--glow-b) 0%, transparent 55%),
    var(--bg);
  color:var(--txt);font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100%;overflow:hidden;
}
h1,h2,h3{font-family:"Space Grotesk",system-ui,sans-serif}
::selection{background:var(--accent-dim);color:#eafffb}
.hidden{display:none!important}

/* ============================ signature header (set-notation) ==============
   The product stated as its own live type signature (ADR-0018's scoreboard,
   restated): the whole sentence is mono, the FLASHVIS logotype is the one
   sans flourish. { } is a tall CONTAINER around the set; the two FS cards
   ARE the display switcher (click → focus/display that die). Compare mode
   (A1a) and speed (A1b) live in the sentence — sim-global controls, not
   per-op stimulus — so the WORKLOAD strip below holds only stimulus. */
.sig{flex:none;display:flex;align-items:center;flex-wrap:wrap;gap:6px 11px;
  padding:14px 22px 22px;border-bottom:1px solid var(--line-soft);
  background:linear-gradient(180deg,var(--panel),var(--bg));
  font-size:15px;letter-spacing:.005em}
.logo{font-family:"Space Grotesk";font-weight:700;font-size:20px;letter-spacing:.15em;color:var(--txt)}
.logo b{color:var(--prog);font-weight:700}
.hdsep{color:var(--txt-faint);margin:0 1px}
.word,.tail{color:var(--txt-dim)}
.tail .k{color:var(--txt);font-weight:500}

/* the set: { [cards] } — braces stretch to card height, reading as a container.
   The .fs cards are built DYNAMICALLY by playground.js into #fsSet, one per
   participating FS (both, always — A2), separated by a .setsep comma. */
.setwrap{display:inline-flex;align-items:stretch;gap:8px;margin:0 2px}
.brace{display:flex;align-items:center;font-size:34px;font-weight:200;line-height:0;
  color:var(--txt-faint);user-select:none;transform:scaleY(1.9);transform-origin:center}
.fsset{display:inline-flex;align-items:stretch;gap:8px}
.setsep{align-self:center;color:var(--txt-faint);font-size:16px;margin:0 -3px}

.fs{font-family:inherit;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:2px;min-width:118px;
  padding:6px 12px 7px;border:1px solid var(--line);border-radius:7px;
  background:linear-gradient(180deg,var(--chrome),var(--panel-2));color:var(--txt-dim);transition:.14s;position:relative}
.fs:hover{border-color:var(--accent-dim);color:var(--txt)}
.fs:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.fs-top{display:flex;align-items:center;gap:8px}
.fs-name{font-family:"Space Grotesk";font-weight:700;font-size:14.5px;letter-spacing:.05em;color:var(--txt);line-height:1.1;transition:.14s}
.fs-run{width:6px;height:6px;border-radius:50%;background:var(--txt-faint);margin-left:auto;flex:none}
.fs-vital{display:flex;align-items:baseline;gap:6px}
.fs-v{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--txt-dim)}
.fs-l{font-size:8.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--txt-faint)}
/* EMA throughput bar (A8): leader = 100% (--lead), others scaled to the leader. */
.fs-bar{display:flex;align-items:center;gap:6px;margin-top:2px}
.fs-bar .track{flex:1;height:3px;border-radius:2px;background:#ffffff0d;overflow:hidden}
.fs-bar .track i{display:block;height:100%;width:0;border-radius:2px;background:var(--accent-dim);transition:width .3s ease}
.fs-bar .tag{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-faint)}

.fs.on{border-color:var(--accent);color:var(--txt);
  background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 14%,var(--chrome)),var(--panel-2));box-shadow:0 0 0 1px var(--accent),0 0 22px -9px var(--accent)}
.fs.on .fs-name{color:var(--accent)}
.fs.on .fs-v{color:var(--txt)}
.fs.leader .fs-bar .track i{background:var(--lead);box-shadow:0 0 8px -2px var(--lead)}
/* the un-focused FS is still running — a slow live pulse says so */
.fs:not(.on) .fs-run{animation:live 2.4s ease-in-out infinite}
@keyframes live{0%,100%{background:var(--accent-dim)}50%{background:var(--lead)}}
/* Pace: the FS that reached the frontier first HOLDS for the laggard (A8) */
.fs.waiting .fs-run{background:var(--hold);animation:hold 1.1s ease-in-out infinite}
@keyframes hold{0%,100%{opacity:.35}50%{opacity:1}}
.fs-hold{display:none;align-items:center;gap:4px;font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--hold)}
.fs.waiting .fs-hold{display:inline-flex}
.fs.waiting .fs-l{display:none}

/* speed inline in the sentence (A1b); mode wheel (A1a) */
.sig-speed{display:inline-flex;align-items:center;gap:7px;color:var(--txt-dim)}
/* the speed readout is part of the sentence it sits in, not an inset hint:
   override .hintk's small size so it renders at the sentence's own type. */
.sig-speed .hintk{font-size:15px;letter-spacing:.005em;color:inherit}
/* the compare mode is an inline WHEEL: the active phrase sits on the sentence
   baseline, the other mode peeks below — faded and tilted back, like the next
   notch of a reel. Click and it rotates up into place; the old one recedes. */
.modewheel{position:relative;display:inline-block;vertical-align:baseline;
  background:none;border:none;padding:0;margin:0;cursor:pointer;font-family:inherit;text-align:left;perspective:280px}
.modewheel:focus-visible{outline:2px solid var(--accent);outline-offset:4px;border-radius:4px}
/* invisible in-flow sizer: sets the box width AND baseline so the active
   phrase lands on the sentence's own baseline. */
.mghost{visibility:hidden;white-space:nowrap;font-size:15px;line-height:1.5;font-weight:500;letter-spacing:.005em}
.mopt{position:absolute;left:0;top:0;white-space:nowrap;font-size:15px;line-height:1.5;font-weight:500;letter-spacing:.005em;
  transform-origin:center bottom;backface-visibility:hidden;color:var(--txt-faint);opacity:.4;
  transform:translateY(14px) scale(.82) rotateX(-32deg);
  transition:transform .42s cubic-bezier(.34,.82,.28,1),opacity .42s,color .42s}
.mopt.active{color:var(--accent);opacity:1;transform:translateY(0) scale(1) rotateX(0deg);z-index:2}
.mopt.peek{z-index:1}
.modewheel:hover .mopt.peek{opacity:.62;color:var(--txt-dim)}

/* ============================ main split: stage | side panel | console ====
   Fix #2: the sector inspector + telemetry live in their OWN column beside the
   die (readable while clicking die sectors), NOT stacked under it. This is my
   fixed layout — the reference's under-die stacking is one of the regressions
   the fixes correct, so it does NOT win here; only its *styling* is ported. */
.main{flex:1 1 auto;min-height:0;overflow:hidden;display:grid;
  grid-template-columns:minmax(0,1fr) 292px minmax(348px,432px);gap:22px;
  padding:18px 22px 16px;max-width:1440px;width:100%;margin:0 auto;align-items:stretch}

.stage{display:flex;flex-direction:column;gap:12px;min-width:0;min-height:0;overflow:auto}

/* the emulated NOR chip drawn as its real package: an 8-pin small-outline body
   with 8 gull-wing legs (A4). The body sits ABOVE the legs (z-index) so each lead disappears
   under the package edge, not stuck to the side. Enclosure tokens
   (--pkg-a/b/line) are desaturated on purpose — the cell-state colors below
   (--prog/--stale/--index/--program/--erase/--read) are the DATA and are
   untouched. */
.chip-pkg{align-self:center;display:flex;align-items:stretch;width:100%;max-width:560px}
.diewrap{position:relative;z-index:1;flex:1;aspect-ratio:1;padding:14px;border-radius:8px;
  background:linear-gradient(180deg,var(--pkg-a),var(--pkg-b));border:1px solid var(--pkg-line);
  box-shadow:inset 0 0 0 1px #ffffff05,inset 0 22px 40px -30px #fff2,0 24px 60px -30px #000}
.diewrap::before{content:"";position:absolute;top:8px;left:8px;width:9px;height:9px;border-top:2px solid var(--accent-dim);border-left:2px solid var(--accent-dim)}
.die-stack{width:100%;height:100%}
.die{display:grid;grid-template-columns:repeat(var(--sector-cols,8),1fr);gap:var(--sector-gap);width:100%;height:100%}
.sector{position:relative;display:grid;grid-template-columns:repeat(var(--page-cols,4),1fr);gap:var(--cell-gap);padding:3px;border-radius:var(--radius);
  background:var(--sector-bg,#0c1013);border:1px solid #1b1f23;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.sector:hover{border-color:var(--accent-dim)}
.sector.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 16px -4px var(--accent)}
/* No box-shadow transition: the read/prog heat glow (viz.js) rewrites .glow's
   box-shadow every frame with its own decayed value, so a CSS transition here
   would only lag and damp that glow toward the dim resting ring. */
.cell{position:relative;aspect-ratio:1;border-radius:1.5px;background:var(--erased);box-shadow:inset 0 0 0 1px var(--erased-edge)}
/* .fillwrap owns the rounded overflow-clip (so the rectangular .fill stays inside
   the cell's rounded shape) — .cell itself no longer clips, so .glow's box-shadow
   below can bleed outside the cell's own box in every direction (z-height fix). */
.cell .fillwrap{position:absolute;inset:0;border-radius:inherit;overflow:hidden}
.cell .fill{position:absolute;left:0;right:0;bottom:0;height:0;background:var(--prog);transition:height .18s ease}
/* .glow carries only the BLOOM (core + outer glow, written by viz.js drawHeat —
   the heat RING/border is written to the .cell body, BELOW this layer). It lives
   in ONE layer ABOVE every opaque body AND every border in the die: absolutely
   positioned with a positive z-index, and NO ancestor up to .diewrap establishes a
   stacking context (.sector/.cell are position:relative with z-index:auto), so
   every .glow paints in the diewrap's stacking context — above ALL cells/sectors/
   borders everywhere — not just cells earlier in DOM order. That is what stops a
   cell's border ever peeking over the bloom (the directional top-left artifact).
   inset:0 keeps each glow aligned to its own cell; pointer-events:none lets clicks
   fall through. Translucent box-shadows blend additively, so bloom paint order is
   moot. */
.cell .glow{position:absolute;inset:0;z-index:5;pointer-events:none}
.cell[data-s="prog"]{box-shadow:inset 0 0 0 1px var(--prog-edge),0 0 6px -2px color-mix(in srgb,var(--prog) 33%,transparent)}
.cell[data-live="live"] .fill{background:var(--prog)}
.cell[data-live="obsolete"] .fill{background:var(--stale)}
.cell[data-live="obsolete"]{box-shadow:inset 0 0 0 1px var(--stale-edge)}
.cell[data-live="meta"] .fill{background:var(--index)}
.die.heat .sector{background:var(--wc,var(--sector-bg,#0c141b));border-color:#0006}
.die.heat .cell{opacity:.13}
.die.heat .sector.sel{box-shadow:0 0 0 1px var(--accent)}

/* chunky bright gull-wing leads: horizontal gradient runs bright FOOT (outer)
   to shadowed SHOULDER (tucked under the body); vertical inset highlight +
   shadow give the metal its rounded sheen. 4 leads per side. */
.pins{display:flex;flex-direction:column;justify-content:space-evenly;padding:16px 0;flex:none;z-index:0}
.pins i{width:22px;height:32px;position:relative;
  box-shadow:0 2px 4px #000a,inset 0 2px 1px -1px #ffffff85,inset 0 -4px 4px -3px #000a}
.pins-l{margin-right:-5px}
.pins-l i{border-radius:3px 0 0 3px;
  background:linear-gradient(90deg,#eef1f3 0%,#c6cbcf 32%,#888d92 72%,#565b60 100%)}
.pins-r{margin-left:-5px}
.pins-r i{border-radius:0 3px 3px 0;
  background:linear-gradient(90deg,#565b60 0%,#888d92 28%,#c6cbcf 68%,#eef1f3 100%)}

/* pin 1 / CS (chip-select) activity indicator (top-left lead, SOP-8
   convention, by the notch): the fast per-frame twin of the card's
   holding/stalled readout. playground.js toggles .cs-active/.cs-paused on
   #pinCS every rAF from coordinator.waitStates()[focusedFsId] — positive
   logic on purpose (CS is electrically active-low, shown here active-HIGH):
   lit = the focused die is actually executing/animating, quiet = parked on
   a gate. A short transition keeps RACE's expected rapid flicker readable
   as flicker (healthy) rather than a stutter, without smearing into a glow
   that never settles. */
.pin-cs{transition:box-shadow .07s ease-out,filter .07s ease-out}
.pin-cs.cs-active{filter:brightness(1.2) saturate(1.35);
  box-shadow:0 2px 4px #000a,inset 0 2px 1px -1px #ffffff85,inset 0 -4px 4px -3px #000a,
    0 0 5px 1px var(--accent),0 0 12px 2px var(--accent-dim)}
.pin-cs.cs-paused{filter:brightness(.68) saturate(.35)}
.cs-label{position:absolute;top:50%;right:calc(100% + 5px);transform:translateY(-50%) rotate(180deg);
  writing-mode:vertical-rl;text-orientation:mixed;
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt-faint);pointer-events:none;user-select:none;transition:color .07s ease-out}
.pin-cs.cs-active .cs-label{color:var(--accent)}

/* static device geometry line (A5) — replaces the old dynamic .stagefoot;
   the dynamic stats it used to show moved into Flash Stats (A6). Built once
   by playground.js from the same geometry data #specGeo is sourced from. */
.geo{display:flex;gap:16px;color:var(--txt-faint);font-size:11px;letter-spacing:.04em;flex-wrap:wrap;justify-content:center}
.geo b{color:var(--txt-dim);font-weight:500}

/* die-adjacent legend chip-row + heatmap toggle (per-FS class descriptor).
   Chips are built dynamically into #legendChips (the .legend list). */
.diebar{display:flex;align-items:center;gap:10px 12px;flex-wrap:wrap;justify-content:center}
.legend{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.chip{position:relative;display:inline-flex;align-items:center;gap:6px;cursor:default;
  font-size:11px;color:var(--txt-dim);padding:4px 8px;border-radius:5px;border:1px solid var(--line-soft);background:var(--panel-2)}
.chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.chip .sw{width:11px;height:11px;border-radius:2px;flex:none;box-shadow:inset 0 0 0 1px #fff2}
.chip .chip-hint{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  width:max-content;max-width:230px;padding:6px 9px;border-radius:6px;font-size:10.5px;line-height:1.4;color:var(--txt);
  background:var(--panel-2);border:1px solid var(--line);box-shadow:0 12px 30px -14px #000;
  opacity:0;visibility:hidden;transition:opacity .12s;pointer-events:none;z-index:5}
.chip:hover .chip-hint,.chip:focus-visible .chip-hint,.chip:focus .chip-hint{opacity:1;visibility:visible}
.sw.erased{background:var(--erased);box-shadow:inset 0 0 0 1px var(--erased-edge)}
.sw.prog{background:var(--prog)} .sw.obsolete{background:var(--stale)} .sw.index{background:var(--index)}
.sw.program{background:var(--program)} .sw.erase{background:var(--erase)} .sw.read{background:var(--read)}

/* palette switcher — sits with the legend because it governs what the legend
   MEANS: pick a palette and the whole die + live glow re-skins. A live preview
   of the four load-bearing colors (read · write · erase · live) reads the theme
   vars directly, so it recolors itself the instant the palette changes. */
.theme-pick{display:inline-flex;align-items:center;gap:8px;color:var(--txt-dim);
  font-size:10.5px;letter-spacing:.05em;cursor:pointer;user-select:none;
  padding:3px 4px 3px 9px;border:1px solid var(--line-soft);border-radius:6px;background:var(--panel-2)}
.theme-pick:focus-within{border-color:var(--accent)}
.tp-label{font-size:8.5px;letter-spacing:.16em;color:var(--txt-faint)}
.tp-dots{display:inline-flex;gap:3px}
.tp-dots i{width:9px;height:9px;border-radius:50%;box-shadow:inset 0 0 0 1px #fff2}
.tp-dots .d-read{background:var(--read)} .tp-dots .d-prog-op{background:var(--program)}
.tp-dots .d-erase{background:var(--erase)} .tp-dots .d-live{background:var(--prog)}
.theme-pick select{font-family:inherit;font-size:11px;color:var(--txt);background:var(--chrome);
  border:1px solid var(--line);border-radius:5px;padding:4px 7px;cursor:pointer;outline:none}
.theme-pick select:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

/* side panel — telemetry + sector inspector, its own column (fix #2) */
.panel{display:flex;flex-direction:column;gap:14px;min-height:0;overflow:auto}
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line-soft);border-radius:8px;padding:13px 14px}
.card h3{margin:0 0 10px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-dim);display:flex;justify-content:space-between}
.util{height:9px;border-radius:5px;overflow:hidden;display:flex;background:var(--panel-2);border:1px solid var(--line-soft);margin-bottom:11px}
.util i{display:block;height:100%;width:0;transition:width .25s ease}
.util .u-live{background:var(--prog)} .util .u-obs{background:var(--stale)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.stat{display:flex;flex-direction:column;gap:1px}
.stat .n{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums}
.stat .n.amp{color:var(--prog)} .stat .n.ok{color:var(--accent)} .stat .n.bad{color:var(--err)}
.stat .l{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt-faint)}
.insp{font-size:12px;color:var(--txt-dim);min-height:48px}
.insp .addr{font-size:15px;color:var(--txt)}
.insp .row{display:flex;justify-content:space-between;margin-top:6px}
.insp .row span:last-child{color:var(--txt)}
.insp .hint{color:var(--txt-faint);font-style:italic}

/* ============================ the console tape (signature) ================= */
.pane{display:flex;flex-direction:column;min-height:0;gap:11px}

/* register A — the workload strip (drives auto-churn on every FS). Speed +
   compare mode now live in the header sentence (A1a/A1b, ADR-0020: they're
   sim-global execution controls, not per-op stimulus) — this strip holds
   only Run/Step + BG GC. */
.workload{flex:none;display:flex;align-items:center;gap:9px 12px;flex-wrap:wrap;
  padding:9px 11px;border:1px solid var(--line-soft);border-radius:8px;background:linear-gradient(180deg,var(--chrome),var(--panel-2))}
.workload::before{content:"WORKLOAD";font-size:8.5px;letter-spacing:.16em;color:var(--txt-faint);align-self:center;writing-mode:vertical-rl;transform:rotate(180deg);margin-right:2px}
.egrp{display:flex;align-items:center;gap:7px}
.sep{width:1px;height:22px;background:var(--line)}
.ctl{display:flex;align-items:center;gap:7px;color:var(--txt-dim);font-size:10.5px;letter-spacing:.05em}
.hintk{color:var(--txt-faint);font-size:10px}
input[type=range]{-webkit-appearance:none;appearance:none;width:74px;height:3px;border-radius:2px;background:var(--line);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px -1px var(--accent);cursor:pointer}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border:none;border-radius:50%;background:var(--accent);cursor:pointer}
input[type=range]:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

.btn{font-family:inherit;font-size:12px;color:var(--txt);background:var(--chrome);border:1px solid var(--line);border-radius:6px;padding:6px 11px;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--accent-dim);background:color-mix(in srgb,var(--accent) 14%,var(--chrome))}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn.primary{background:var(--prog);color:#241a06;border-color:var(--prog);font-weight:600}
.btn.primary:hover{background:var(--prog-edge)}
.btn .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.toggle{display:flex;align-items:center;gap:8px;color:var(--txt-dim);font-size:10.5px;letter-spacing:.05em;cursor:pointer;user-select:none}
.toggle input{position:absolute;opacity:0;pointer-events:none}
.tswitch{width:32px;height:17px;border-radius:10px;background:var(--chrome);border:1px solid var(--line);position:relative;transition:.15s}
.tswitch::after{content:"";position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:var(--txt-faint);transition:.15s}
.toggle input:checked + .tswitch{background:var(--accent-dim);border-color:var(--accent)}
.toggle input:checked + .tswitch::after{transform:translateX(15px);background:var(--accent)}
.toggle input:focus-visible + .tswitch{outline:2px solid var(--accent);outline-offset:2px}

/* the tape itself: journal of truth. #tape is the scrollable log (.tape-scroll);
   playground.js appends per-entry .line rows into it directly. */
.tape{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
  background:var(--panel-2);border:1px solid var(--line-soft);border-radius:8px;overflow:hidden}
.tape-gap{flex:none;display:flex;align-items:center;gap:10px;padding:8px 13px;
  border-bottom:1px solid color-mix(in srgb,var(--hold) 34%,var(--line-soft));background:linear-gradient(180deg,color-mix(in srgb,var(--hold) 14%,var(--panel-2)),var(--panel-2));color:var(--hold);font-size:11px}
.tape-gap b{font-variant-numeric:tabular-nums}
.tape-gap .catchup{margin-left:auto;font-size:10.5px;padding:4px 9px}
.tape-scroll{flex:1;min-height:0;overflow:auto;padding:9px 13px;font-size:12px;line-height:1.55}
.line{white-space:pre-wrap;word-break:break-word;padding-left:12px;text-indent:-12px}
.line.in{color:var(--accent)}            /* injected command echo — "what I did" */
.line.out{color:var(--txt)}              /* op result with simulated cost */
.line.churn{color:var(--txt-dim)}        /* auto-workload op — "what the workload did" */
.line.err{color:var(--err)}
.line.sys{color:var(--txt-faint)}
/* lifecycle (ADR-0018): queued dimmed to --queued; live lit to accent — applied
   in place as the coordinator advances an entry queued → live → done. */
.line[data-state="queued"]{color:var(--queued)}
.line[data-state="live"]{color:var(--accent);font-weight:500}

/* register B — manual pokes (inject discrete operations) + free-form input */
.pokes{flex:none;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.pokes .reg{font-size:8.5px;letter-spacing:.16em;color:var(--txt-faint);margin-right:2px}
.prompt{flex:none;display:flex;align-items:center;gap:8px;
  border:1px solid var(--line-soft);border-radius:8px;background:var(--panel-2);padding:8px 12px}
.prompt .p{color:var(--accent);font-weight:700}
.prompt input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:12.5px;min-width:0}
.prompt input::placeholder{color:var(--txt-faint)}
.prompt .hintk{white-space:nowrap}

@media (max-width:1040px){
  html,body{height:auto}
  body{overflow:auto;min-height:100%}
  .main{grid-template-columns:1fr;overflow:visible;min-height:auto}
  .stage,.panel,.pane{overflow:visible;min-height:auto}
  /* FIX #5: the log keeps a bounded height + internal scroll so workload + log +
     pokes stay ~one viewport and the tape never grows the page unbounded (the
     reference's min-height:300 would; a max-height cap does not). */
  .tape{min-height:220px;max-height:52vh}
  .fsset{width:100%}
  .fs{flex:1 1 118px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<header class="sig" aria-label="flashvis status and controls">
  <span class="logo">FLASH<b>VIS</b></span>
  <span class="hdsep">·</span>
  <span class="word">real</span>
  <!-- The set-notation sentence (ADR-0018's scoreboard, restated, A1): the two
       FS cards ARE the display switcher. Built dynamically by playground.js
       into #fsSet — one .fs button per participating FS (both, always — A2),
       separated by a .setsep comma. Click a card to focus it. -->
  <span class="setwrap">
    <span class="brace" aria-hidden="true">{</span>
    <span class="fsset" id="fsSet" role="group" aria-label="filesystem standings — select one to focus"></span>
    <span class="brace" aria-hidden="true">}</span>
  </span>
  <span class="tail">running on an emulated <span class="k">NOR flash</span> at</span>
  <label class="sig-speed">
    <input type="range" id="speed" min="0" max="100" value="40" aria-label="speed">
    <span id="speedRead" class="hintk"></span>
  </label>
  <span class="tail">measuring</span>
  <!-- Compare-mode wheel (A1a): a switch, not a link. The active phrase sits
       on the sentence baseline; the other mode peeks below, faded/tilted.
       Click rotates the peek up; wires to coordinator.setMode. -->
  <button class="modewheel" id="modeWheel" role="switch" aria-checked="false"
          title="switch compare mode" aria-label="compare mode; click to switch">
    <span class="mghost" aria-hidden="true">least time for equal ops</span>
    <span class="mopt" id="modeOpt-pace" data-mode="pace">least time for equal ops</span>
    <span class="mopt" id="modeOpt-race" data-mode="race">most ops in equal time</span>
  </button>
</header>

<div class="main">
  <div class="stage">

      <div class="pins pins-l"><i id="pinCS" class="pin-cs"><span class="cs-label" aria-hidden="true">CS</span></i><i></i><i></i><i></i></div>
      <div class="diewrap"><div class="die-stack" id="dieStack"></div></div>

  <div class="panel">

      <div class="grid2">
        <div class="stat"><span class="n amp" id="sAmp">1.0×</span><span class="l">Write amp</span></div>

        <div class="stat"><span class="n" id="sRead">0</span><span class="l">Reads</span></div>
        <div class="stat"><span class="n" id="sWear">0</span><span class="l">Peak wear</span></div>

    </div>
    <div class="card">

      <span class="hintk">↑ history · enter</span>

  </section>
</div>
