# CI mirror of `npm run ci`: build the FASTFFS + LittleFS WASM and run the full
# guard suite (both pipelines, byte-exact integrity, console/dom-smoke, real
# backend, lockstep concurrency, and the leak/heat guards).
#
# Day-to-day this project is verified locally with `npm run ci`; this workflow
# just makes the same checks enforce on push once the repo is on GitHub.
name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive        # fs/fastffs (live-map helper on origin/main) + fs/littlefs

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 6.0.2                # matches DEVELOPMENT.md's pinned emcc
          actions-cache-folder: emsdk-cache

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm run ci                 # build:fastffs + build:littlefs + full npm test suite
